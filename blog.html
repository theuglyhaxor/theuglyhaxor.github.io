<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Blog | MD Rohan</title>

    <link rel="icon" type="image/png" href="image.png"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg:#0f172a;
            --card:#111827;
            --light:#f8fafc;
            --muted:#94a3b8;
            --border:#1e293b;
            --primary:#2563eb;
            --primary-hover:#1d4ed8;
            --text:#e2e8f0;
        }

        html{scroll-behavior:smooth;}

        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(to bottom right,#020617,#0f172a,#111827);
            color:var(--text);
            line-height:1.7;
            padding:40px 20px;
            min-height:100vh;
        }

        .container{
            max-width:1150px;
            margin:auto;
        }

        /* ================= NAVBAR ================= */

        .navbar{
            position:sticky;
            top:14px;
            z-index:50;
            margin:0 auto 26px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:14px;
            padding:12px 22px;
            background:rgba(15,23,42,0.82);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            backdrop-filter:blur(14px);
            box-shadow:0 10px 30px rgba(0,0,0,0.35);
        }

        .nav-brand{
            font-weight:800;
            font-size:1.05rem;
            color:#fff;
            letter-spacing:-0.3px;
            text-decoration:none;
            white-space:nowrap;
        }

        .nav-brand span{color:#60a5fa;}

        .nav-links{display:flex;flex-wrap:wrap;gap:6px;}

        .nav-links a{
            color:var(--muted);
            text-decoration:none;
            font-size:0.92rem;
            font-weight:500;
            padding:8px 14px;
            border-radius:10px;
            transition:0.25s ease;
        }

        .nav-links a:hover{color:#fff;background:rgba(37,99,235,0.18);}

        .nav-links a.nav-cta{background:var(--primary);color:#fff;font-weight:600;}
        .nav-links a.nav-cta:hover{background:var(--primary-hover);}

        /* ================= HERO ================= */

        .blog-hero{
            background:
                radial-gradient(circle at top right, rgba(37,99,235,0.28), transparent 35%),
                linear-gradient(135deg,#020617,#111827);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:28px;
            padding:60px 50px;
            margin-bottom:34px;
            box-shadow:0 20px 60px rgba(0,0,0,0.45);
        }

        .blog-hero .eyebrow{
            text-transform:uppercase;
            letter-spacing:0.28em;
            font-size:0.82rem;
            font-weight:600;
            color:#60a5fa;
            margin-bottom:16px;
        }

        .blog-hero h1{
            font-size:3rem;
            font-weight:800;
            letter-spacing:-1px;
            margin-bottom:16px;
        }

        .blog-hero p{
            color:var(--muted);
            font-size:1.08rem;
            max-width:720px;
        }

        /* ================= FILTERS ================= */

        .filter-bar{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:32px;
        }

        .filter-btn{
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            color:#cbd5e1;
            font-family:inherit;
            font-size:0.92rem;
            font-weight:600;
            padding:10px 20px;
            border-radius:999px;
            cursor:pointer;
            transition:0.25s ease;
        }

        .filter-btn:hover{
            border-color:rgba(37,99,235,0.5);
            color:#fff;
        }

        .filter-btn.active{
            background:var(--primary);
            border-color:var(--primary);
            color:#fff;
        }

        .filter-btn .count{
            opacity:0.7;
            font-weight:500;
            margin-left:6px;
        }

        /* ================= POSTS ================= */

        .posts-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
            gap:24px;
        }

        .post-card{
            display:flex;
            flex-direction:column;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:22px;
            overflow:hidden;
            text-decoration:none;
            color:inherit;
            transition:0.35s ease;
        }

        .post-card:hover{
            transform:translateY(-6px);
            border-color:rgba(37,99,235,0.5);
            box-shadow:0 16px 38px rgba(37,99,235,0.16);
        }

        .post-body{
            padding:26px 26px 0;
            flex:1;
        }

        .post-cat{
            display:inline-block;
            font-size:0.74rem;
            font-weight:700;
            letter-spacing:0.05em;
            text-transform:uppercase;
            padding:4px 12px;
            border-radius:999px;
            margin-bottom:16px;
        }

        .post-card h2{
            font-size:1.3rem;
            font-weight:700;
            line-height:1.4;
            margin-bottom:12px;
            color:#f8fafc;
        }

        .post-card .excerpt{
            color:#94a3b8;
            font-size:0.96rem;
        }

        .post-foot{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:20px 26px 24px;
            margin-top:20px;
            color:#64748b;
            font-size:0.85rem;
        }

        .post-foot .read{color:#60a5fa;font-weight:600;}

        .empty{
            grid-column:1/-1;
            text-align:center;
            color:var(--muted);
            padding:60px 20px;
            font-size:1.05rem;
        }

        /* category accent colours */
        .cat-politics{color:#f87171;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.28);}
        .cat-study{color:#34d399;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.28);}
        .cat-security{color:#fbbf24;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.28);}
        .cat-tech{color:#60a5fa;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.28);}
        .cat-default{color:#a78bfa;background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.28);}

        /* ================= FOOTER ================= */

        .footer{
            text-align:center;
            padding:45px 20px 10px;
            color:#94a3b8;
            font-size:0.95rem;
        }

        .footer a{color:#60a5fa;text-decoration:none;}
        .footer a:hover{color:#93c5fd;}

        /* ================= MOBILE ================= */

        @media(max-width:768px){
            .navbar{flex-direction:column;gap:10px;top:8px;padding:14px 18px;}
            .nav-links{justify-content:center;}
            .blog-hero{padding:40px 26px;}
            .blog-hero h1{font-size:2.2rem;}
        }
    </style>
</head>
<body>

<div class="container">

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">MD <span>Rohan</span></a>
        <div class="nav-links">
            <a href="index.html#about">About</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#experience">Experience</a>
            <a href="index.html" class="nav-cta">← Portfolio</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="blog-hero">
        <div class="eyebrow">Blog</div>
        <h1>Notes, Research &amp; Ideas</h1>
        <p>
            Long-form study material, offensive-security research, and reading notes —
            filed by category. Use the filters below to jump to a topic.
        </p>
    </header>

    <!-- CATEGORY FILTERS (auto-generated) -->
    <div class="filter-bar" id="filterBar"></div>

    <!-- POSTS (auto-generated) -->
    <div class="posts-grid" id="postsGrid"></div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 MD Rohan — <a href="index.html">Back to Portfolio</a> ·
        <a href="https://github.com/theuglyhaxor" target="_blank">GitHub</a>
    </div>

</div>

<script>
/* =============================================================
   BLOG POSTS
   -------------------------------------------------------------
   To add a new blog post, copy one block below and edit it.
   Categories are grouped automatically from the "category" field —
   just reuse an existing category name (e.g. "Study Material",
   "Politics & Economics", "Security", "Technology") or invent a
   new one and it will appear as a new filter chip.

   Optional "catClass" controls the colour of the category badge:
     cat-politics | cat-study | cat-security | cat-tech | cat-default
   ============================================================= */
const posts = [
    {
        title: "Mobile Computing — Part 1",
        category: "Study Material",
        catClass: "cat-study",
        excerpt: "A formal academic study guide covering mobile generations (1G–4G), cellular concepts, FDMA/TDMA/CDMA, GSM, GSM vs CDMA, and GPRS.",
        meta: "Academic Notes · English",
        url: "Mobile_Computing_Part-1_Study_Material.html"
    },
    {
        title: "ছোটদের রাজনীতি ও ছোটদের অর্থনীতি",
        category: "Politics & Economics",
        catClass: "cat-politics",
        excerpt: "Revolutionary study notes (বিপ্লবী পাঠ-নোট) on Prof. Nihar Kumar Sarkar's book — unpacking exploitation, surplus value, political awareness, and economics in plain Bangla.",
        meta: "06 July 2026 · বাংলা",
        url: "LPB-Chotoder_Rajniti_Chotoder_orthoniti.html"
    }

    /* ---- ADD NEW POSTS ABOVE THIS LINE ----
    ,{
        title: "Your Post Title",
        category: "Security",
        catClass: "cat-security",
        excerpt: "One or two sentences describing the post.",
        meta: "Date · Tag",
        url: "your-new-post.html"
    }
    */
];

/* ---------- render logic (no need to edit below) ---------- */
const grid = document.getElementById('postsGrid');
const filterBar = document.getElementById('filterBar');
let activeCat = 'All';

function buildFilters(){
    const counts = {};
    posts.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
    const cats = ['All', ...Object.keys(counts)];

    filterBar.innerHTML = '';
    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === activeCat ? ' active' : '');
        const total = cat === 'All' ? posts.length : counts[cat];
        btn.innerHTML = cat + '<span class="count">' + total + '</span>';
        btn.onclick = () => { activeCat = cat; buildFilters(); render(); };
        filterBar.appendChild(btn);
    });
}

function render(){
    const list = activeCat === 'All'
        ? posts
        : posts.filter(p => p.category === activeCat);

    grid.innerHTML = '';

    if(list.length === 0){
        grid.innerHTML = '<div class="empty">No posts in this category yet — check back soon.</div>';
        return;
    }

    list.forEach(p => {
        const a = document.createElement('a');
        a.className = 'post-card';
        a.href = p.url;
        a.innerHTML =
            '<div class="post-body">' +
                '<span class="post-cat ' + (p.catClass || 'cat-default') + '">' + p.category + '</span>' +
                '<h2>' + p.title + '</h2>' +
                '<p class="excerpt">' + p.excerpt + '</p>' +
            '</div>' +
            '<div class="post-foot">' +
                '<span>' + (p.meta || '') + '</span>' +
                '<span class="read">Read →</span>' +
            '</div>';
        grid.appendChild(a);
    });
}

buildFilters();
render();
</script>

</body>
</html>
