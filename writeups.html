<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write-ups — MD. Rohan</title>
<meta name="description" content="Write-ups, research notes and long-form articles by MD. Rohan (theuglyhaxor) — security research, study material and more.">
<link rel="icon" type="image/png" href="avatar.png"/>
<style>
  :root{
    --ink:#111111; --ink2:#333333; --muted:#666666;
    --line:#dcdcdc; --accent:#1f3a5f; --bg:#ffffff; --soft:#f6f7f8;
    --sans:Arial,"Helvetica Neue",Helvetica,"Segoe UI",system-ui,sans-serif;
    --max:900px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
       line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
  .btn{display:inline-block;font-size:14px;font-weight:700;padding:10px 18px;border-radius:4px;
       border:1px solid var(--ink);color:var(--ink);background:#fff;transition:.15s;cursor:pointer}
  .btn:hover{background:var(--ink);color:#fff;text-decoration:none}

  header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line)}
  nav{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{font-weight:700;font-size:17px;color:var(--ink)}
  .brand:hover{text-decoration:none}
  .navlinks{display:flex;gap:24px;align-items:center}
  .navlinks a{font-size:14px;color:var(--ink2)}
  .navlinks a:hover{color:var(--ink);text-decoration:none}

  .head-sec{padding:48px 0 20px}
  .label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
  h1{font-size:32px;font-weight:700;letter-spacing:.01em}
  .lead{color:var(--ink2);max-width:70ch;margin-top:12px}

  .filters{display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 24px}
  .fchip{font-size:13px;color:var(--ink2);padding:7px 14px;border:1px solid var(--line);border-radius:4px;
         background:#fff;cursor:pointer;transition:.15s;font-family:inherit}
  .fchip:hover{border-color:var(--ink);color:var(--ink)}
  .fchip.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .fchip .c{opacity:.65;margin-left:6px}

  .posts{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding-bottom:80px}
  .post{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);
        border-radius:6px;padding:22px;transition:.15s;min-height:190px}
  .post:hover{border-color:var(--ink);text-decoration:none}
  .cat{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
       padding:4px 11px;border-radius:4px;align-self:flex-start;margin-bottom:14px;
       border:1px solid #111111;color:#ffffff;background:#111111}
  .post h3{font-size:17px;line-height:1.35;margin-bottom:9px;color:var(--ink)}
  .post p{color:var(--ink2);font-size:14px;flex:1}
  .post .foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;color:var(--muted);font-size:12px}
  .post .read{color:var(--accent);font-weight:700}
  .empty{color:var(--muted);padding:36px 0}

  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--muted);font-size:13px;
         display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  @media(max-width:640px){.navlinks a:not(.btn){display:none}}
</style>
</head>
<body>

<header>
  <nav class="wrap">
    <a class="brand" href="index.html">MD. Rohan</a>
    <div class="navlinks">
      <a href="index.html">Portfolio</a>
      <a href="cv.html" target="_blank">CV</a>
      <a class="btn" href="index.html">← Back to Portfolio</a>
    </div>
  </nav>
</header>

<main>
  <section class="head-sec">
    <div class="wrap">
      <div class="label">Write-ups</div>
      <h1>Notes, research &amp; write-ups.</h1>
      <p class="lead">Security research, bug-bounty field notes, study material and long-form writing. Filter by topic below — new posts land at the top.</p>

      <div class="filters" id="filters"></div>
    </div>
  </section>

  <section class="wrap">
    <div class="posts" id="posts"></div>
  </section>
</main>

<footer class="wrap">
  <div>© <span id="yr"></span> MD. Rohan — theuglyhaxor</div>
  <div>Khulna, Bangladesh · <a href="index.html">Portfolio</a></div>
</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  /* =======================================================================
     WRITE-UPS LIST — edit here to add a new post.
     Copy a block, edit the values, and put the NEWEST at the TOP.
     ======================================================================= */
  const posts = [
    {
      title:    "Mobile Computing — Part 1",
      category: "Study Material",
      excerpt:  "A formal academic study guide covering mobile generations (1G–4G), cellular concepts, FDMA/TDMA/CDMA, GSM, GPRS and more.",
      meta:     "English · Academic Notes",
      url:      "Mobile_Computing_Part-1_Study_Material.html"
    },
    {
      title:    "মেন্টাল হেলথ — ADHD, বাইপোলার ডিসঅর্ডার ও আমার গল্প",
      category: "Mental Health",
      excerpt:  "ADHD ও বাইপোলার ডিসঅর্ডার নিয়ে একটি ব্যক্তিগত ও তথ্যভিত্তিক লেখা — লক্ষণ, অভিজ্ঞতা এবং সামলে চলার উপায়।",
      meta:     "বাংলা · Personal",
      url:      "Mental_Health_ADHD_BI_POLAR.html"
    },
    {
      title:    "ছোটদের রাজনীতি ও ছোটদের অর্থনীতি — L.P.B. 01",
      category: "Politics & Economics",
      excerpt:  "বিপ্লবী পাঠ-নোট: সহজ ভাষায় রাজনীতি ও অর্থনীতির মূল ধারণাগুলোর একটি পরিচিতিমূলক লেখা।",
      meta:     "বাংলা · Long-form",
      url:      "LPB-Chotoder_Rajniti_Chotoder_orthoniti.html"
    }
    /* ---- ADD NEW POSTS ABOVE THIS LINE ---- */
  ];

  const postsEl = document.getElementById('posts');
  const filtersEl = document.getElementById('filters');
  let active = "All";

  function counts(){
    const m = {All: posts.length};
    posts.forEach(p => m[p.category] = (m[p.category]||0) + 1);
    return m;
  }
  function renderFilters(){
    const c = counts();
    const cats = ["All", ...Object.keys(c).filter(k=>k!=="All")];
    filtersEl.innerHTML = cats.map(cat =>
      `<button class="fchip ${cat===active?'active':''}" data-cat="${cat}">${cat}<span class="c">${c[cat]||0}</span></button>`
    ).join('');
    filtersEl.querySelectorAll('.fchip').forEach(b =>
      b.addEventListener('click', () => { active = b.dataset.cat; renderFilters(); renderPosts(); })
    );
  }
  function renderPosts(){
    const list = posts.filter(p => active==="All" || p.category===active);
    postsEl.innerHTML = list.length ? list.map(p => `
      <a class="post" href="${p.url}">
        <span class="cat">${p.category}</span>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <div class="foot"><span>${p.meta||''}</span><span class="read">Read →</span></div>
      </a>`).join('')
      : `<div class="empty">No write-ups in this category yet.</div>`;
  }
  renderFilters(); renderPosts();
</script>
</body>
</html>
